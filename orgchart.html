<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Influnic OrgChart Builder</title>
<style>
:root{--bg:#0f172a;--panel:rgba(15,23,42,.72);--card:rgba(255,255,255,.94);--text:#0f172a;--muted:#64748b;--accent:#7c3aed;--accent-2:#06b6d4;--danger:#ef4444;--shadow:0 18px 50px rgba(2,6,23,.28);--radius:20px}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 20% 10%,rgba(124,58,237,.28),transparent 32%),radial-gradient(circle at 82% 20%,rgba(6,182,212,.23),transparent 28%),linear-gradient(135deg,#020617,#111827 42%,#172554);color:#fff}button,input,textarea,select{font:inherit}.app{display:grid;grid-template-columns:360px 1fr;height:100%}.sidebar{padding:20px;background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(15,23,42,.68));border-right:1px solid rgba(255,255,255,.1);backdrop-filter:blur(20px);overflow:auto}.top{display:flex;justify-content:space-between;gap:12px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px;min-width:0}.logo{width:56px;height:56px;border-radius:16px;padding:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);box-shadow:0 12px 26px rgba(124,58,237,.18);flex:0 0 auto}.logo img{width:100%;height:100%;object-fit:contain;border-radius:12px}h1{font-size:18px;margin:0;letter-spacing:-.03em}.subtitle{margin:3px 0 0;color:#cbd5e1;font-size:12px;line-height:1.4}.lang{min-width:108px}.lang label{margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.08em}select,input,textarea{width:100%;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:11px 12px;outline:0;color:#fff;background:rgba(2,6,23,.35)}select{padding:10px 12px}textarea{min-height:88px;resize:vertical}input:focus,textarea:focus,select:focus{border-color:rgba(6,182,212,.65);box-shadow:0 0 0 4px rgba(6,182,212,.13);background:rgba(2,6,23,.55)}.section{border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.065);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:0 10px 30px rgba(0,0,0,.13)}.section-title{margin:0 0 12px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#e2e8f0}label{display:block;margin:10px 0 6px;font-size:12px;color:#cbd5e1;font-weight:700}.btn{border:0;border-radius:14px;padding:11px 12px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);cursor:pointer;transition:.15s;user-select:none}.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.18)}.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 12px 30px rgba(6,182,212,.18)}.btn.danger{background:rgba(239,68,68,.82)}.btn.full{width:100%;margin-top:10px}.person-list{display:grid;gap:8px}.person-chip{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 10px;border-radius:14px;color:#fff;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.1);cursor:grab}.person-left{display:flex;align-items:center;gap:9px;min-width:0}.avatar{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;color:#fff;font-size:12px;font-weight:900;background:linear-gradient(135deg,#f97316,#ec4899)}.person-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:800}.person-actions{display:flex;gap:5px}.main{display:grid;grid-template-rows:auto 1fr;min-width:0;height:100%}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(15,23,42,.38);backdrop-filter:blur(16px)}.toolbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.hint{color:#cbd5e1;font-size:13px;line-height:1.5}.mode-pill{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.1);color:#e2e8f0;font-size:12px;font-weight:800;border:1px solid rgba(255,255,255,.1);min-width:72px;text-align:center}.canvas-wrap{position:relative;overflow:hidden;min-width:0}.canvas{position:absolute;inset:0;overflow:auto;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:28px 28px}.board{position:relative;width:2800px;height:1800px;transform-origin:0 0}svg.connections{position:absolute;inset:0;width:2800px;height:1800px;pointer-events:none;overflow:visible}.temp-line{stroke:rgba(6,182,212,.9);stroke-width:3;stroke-dasharray:8 7;fill:none}.conn-line{stroke:rgba(226,232,240,.7);stroke-width:3;fill:none;filter:drop-shadow(0 6px 8px rgba(0,0,0,.22))}.conn-hit{stroke:transparent;stroke-width:18;fill:none;pointer-events:stroke;cursor:pointer}.conn-hit:hover+.conn-line{stroke:#22d3ee}.box{position:absolute;color:var(--text);background:var(--card);border:1px solid rgba(255,255,255,.55);border-radius:22px;box-shadow:var(--shadow);overflow:visible;cursor:move;user-select:none}.box.selected{outline:4px solid rgba(6,182,212,.65);border:3px solid #22d3ee;box-shadow:0 0 0 7px rgba(6,182,212,.18),var(--shadow)}.box.drag-over{box-shadow:0 0 0 5px rgba(124,58,237,.22),var(--shadow)}.box-inner{height:100%;overflow:hidden;border-radius:22px;background:var(--card);display:flex;flex-direction:column}.box-head{padding:14px 14px 11px;background:linear-gradient(135deg,rgba(124,58,237,.14),rgba(6,182,212,.13));border-bottom:1px solid rgba(15,23,42,.07);display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}.box-title{margin:0;font-size:16px;line-height:1.2;letter-spacing:-.03em;word-break:break-word}.box-actions{display:flex;gap:5px}.icon-btn{border:0;width:28px;height:28px;border-radius:10px;background:rgba(15,23,42,.09);color:#334155;cursor:pointer;font-weight:900}.icon-btn:hover{background:rgba(15,23,42,.16)}.box-body{padding:12px 14px 14px;overflow:auto}.resp-title{color:#475569;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}.resp-list{margin:0 0 10px;padding-left:17px;color:#334155;font-size:13px;line-height:1.38}.assigned{display:flex;flex-wrap:wrap;gap:6px;min-height:35px;padding-top:4px;border-top:1px dashed rgba(100,116,139,.35)}.assigned-person{display:inline-flex;align-items:center;gap:6px;max-width:100%;padding:5px 7px;border-radius:999px;color:#0f172a;background:rgba(14,165,233,.13);border:1px solid rgba(14,165,233,.22);font-size:12px;font-weight:800}.assigned-person span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.remove-person{border:0;background:transparent;cursor:pointer;color:#475569;font-weight:900;padding:0}.connector{position:absolute;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));border:3px solid #fff;box-shadow:0 6px 12px rgba(2,6,23,.24);cursor:crosshair;z-index:3}.connector.left{left:-9px;top:50%;transform:translateY(-50%)}.connector.right{right:-9px;top:50%;transform:translateY(-50%)}.connector.top{left:50%;top:-9px;transform:translateX(-50%)}.connector.bottom{left:50%;bottom:-9px;transform:translateX(-50%)}.resize-handle{position:absolute;right:-6px;bottom:-6px;width:18px;height:18px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border:3px solid #fff;box-shadow:0 5px 12px rgba(2,6,23,.25);cursor:nwse-resize;z-index:4}.selection-rect{position:absolute;border:2px dashed #22d3ee;background:rgba(6,182,212,.12);pointer-events:none;z-index:20}.empty{color:#cbd5e1;font-size:12px;padding:9px;border:1px dashed rgba(255,255,255,.18);border-radius:13px;text-align:center}.modal-backdrop{position:fixed;inset:0;background:rgba(2,6,23,.58);display:none;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(8px)}.modal-backdrop.open{display:flex}.modal{width:min(560px,calc(100vw - 32px));background:#0f172a;border:1px solid rgba(255,255,255,.14);border-radius:24px;padding:18px;color:#fff;box-shadow:0 30px 90px rgba(0,0,0,.4)}.modal h2{margin:0 0 4px;font-size:20px}.modal p{margin:0 0 14px;color:#cbd5e1;font-size:13px}.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:14px}.kbd{display:inline-block;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.13);font-size:11px;font-weight:900}.hidden{display:none}@media(max-width:980px){.app{grid-template-columns:1fr;grid-template-rows:auto 1fr}.sidebar{max-height:50vh;border-right:0;border-bottom:1px solid rgba(255,255,255,.1)}.toolbar{align-items:flex-start;flex-direction:column}.top{flex-direction:column}}

function contentBounds(pad=60){if(!state.boxes.length)return {x:0,y:0,w:1200,h:800};let minX=Math.min(...state.boxes.map(b=>b.x)),minY=Math.min(...state.boxes.map(b=>b.y)),maxX=Math.max(...state.boxes.map(b=>b.x+b.w)),maxY=Math.max(...state.boxes.map(b=>b.y+b.h));let x=Math.max(0,minX-pad),y=Math.max(0,minY-pad),w=Math.min(BASE_W,maxX+pad)-x,h=Math.min(BASE_H,maxY+pad)-y;return {x,y,w:Math.max(300,w),h:Math.max(220,h)}}function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}function wrapLines(ctx,text,maxWidth,maxLines=99){let words=String(text||'').split(/\s+/).filter(Boolean),lines=[],line='';for(let word of words){let test=line?line+' '+word:word;if(ctx.measureText(test).width<=maxWidth)line=test;else{if(line)lines.push(line);line=word;if(lines.length>=maxLines-1)break}}if(line&&lines.length<maxLines)lines.push(line);if(lines.length===maxLines&&words.length){}return lines}function drawArrowHead(ctx,x1,y1,x2,y2){let angle=Math.atan2(y2-y1,x2-x1),size=10;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-size*Math.cos(angle-Math.PI/6),y2-size*Math.sin(angle-Math.PI/6));ctx.lineTo(x2-size*Math.cos(angle+Math.PI/6),y2-size*Math.sin(angle+Math.PI/6));ctx.closePath();ctx.fill()}function drawConnectionOnCanvas(ctx,c,off){let s=anchorPoint(c.from,c.fromAnchor||'right'),e=anchorPoint(c.to,c.toAnchor||'left'),sv=anchorVector(c.fromAnchor||'right'),ev=anchorVector(c.toAnchor||'left'),dist=Math.hypot(e.x-s.x,e.y-s.y),pull=Math.max(70,Math.min(180,dist*.35)),c1={x:s.x+sv.x*pull,y:s.y+sv.y*pull},c2={x:e.x+ev.x*pull,y:e.y+ev.y*pull};ctx.save();ctx.translate(-off.x,-off.y);ctx.strokeStyle='rgba(226,232,240,.82)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.bezierCurveTo(c1.x,c1.y,c2.x,c2.y,e.x,e.y);ctx.stroke();ctx.fillStyle='rgba(226,232,240,.9)';drawArrowHead(ctx,c2.x,c2.y,e.x,e.y);ctx.restore()}function drawBoxOnCanvas(ctx,b,off){let x=b.x-off.x,y=b.y-off.y,w=b.w,h=b.h,r=22;ctx.save();ctx.shadowColor='rgba(2,6,23,.28)';ctx.shadowBlur=22;ctx.shadowOffsetY=12;ctx.fillStyle='rgba(255,255,255,.96)';roundRect(ctx,x,y,w,h,r);ctx.fill();ctx.shadowColor='transparent';ctx.lineWidth=state.selectedBoxIds.includes(b.id)?4:1;ctx.strokeStyle=state.selectedBoxIds.includes(b.id)?'#22d3ee':'rgba(255,255,255,.75)';ctx.stroke();ctx.save();roundRect(ctx,x,y,w,52,r);ctx.clip();let grad=ctx.createLinearGradient(x,y,x+w,y+52);grad.addColorStop(0,'rgba(124,58,237,.18)');grad.addColorStop(1,'rgba(6,182,212,.16)');ctx.fillStyle=grad;ctx.fillRect(x,y,w,52);ctx.restore();ctx.fillStyle='#0f172a';ctx.font='700 16px Inter, Arial, sans-serif';let titleLines=wrapLines(ctx,b.title,w-28,2);titleLines.forEach((line,i)=>ctx.fillText(line,x+14,y+22+i*18));let cy=y+72;ctx.fillStyle='#475569';ctx.font='900 11px Inter, Arial, sans-serif';ctx.fillText(tr('responsibilitiesTitle').toUpperCase(),x+14,cy);cy+=18;ctx.fillStyle='#334155';ctx.font='13px Inter, Arial, sans-serif';let maxRespY=y+h-58;for(let resp of (b.responsibilities.length?b.responsibilities:[tr('noResponsibilitiesYet')])){for(let line of wrapLines(ctx,'• '+resp,w-34,2)){if(cy>maxRespY)break;ctx.fillText(line,x+17,cy);cy+=17}if(cy>maxRespY)break}cy=Math.max(cy+6,y+h-48);ctx.strokeStyle='rgba(100,116,139,.35)';ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(x+14,cy-10);ctx.lineTo(x+w-14,cy-10);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#475569';ctx.font='900 11px Inter, Arial, sans-serif';ctx.fillText(tr('peopleTitle').toUpperCase(),x+14,cy+2);cy+=17;let px=x+14,py=cy;let people=b.peopleIds.map(id=>state.people.find(p=>p.id===id)).filter(Boolean);if(!people.length){ctx.fillStyle='#64748b';ctx.font='12px Inter, Arial, sans-serif';ctx.fillText(tr('dropPeopleHere'),px,py+12)}else{for(let p of people){let label=initials(p.name)+' '+p.name;ctx.font='800 12px In
